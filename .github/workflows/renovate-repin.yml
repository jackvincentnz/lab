name: Renovate Repin

on:
  pull_request:
    branches: [main]
    paths:
      - MODULE.bazel
      - package.json
      - pnpm-lock.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.actor == 'renovate[bot]' || startsWith(github.head_ref, 'renovate/') }}
    env:
      ANDROID_HOME: ""
      IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
      REPIN_PUSH_TOKEN: ${{ secrets.REPIN_PUSH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: ${{ secrets.REPIN_PUSH_TOKEN || github.token }}
          fetch-depth: 0
          fetch-tags: true

      - name: Repin and push lockfile when needed
        run: tools/ci/renovate_repin.sh
